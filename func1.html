<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impulsiona Estágios - IFPB</title>
    <style>
      :root {
        --primary-green: #2d9669;
        --header-bg: #4caf50;
        --sidebar-bg: #5c6bc0;
        --light-bg: #f4f7f6;
        --text-dark: #333;
      }


      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background-color: var(--light-bg);
      }


      /* --- HEADER --- */
      header {
        background-color: white; /* Mudei para branco para destacar a logo verde */
        border-bottom: 3px solid var(--primary-green);
        color: var(--text-dark);
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }


      .logo-area {
        display: flex;
        align-items: center;
        gap: 15px;
      }


      /* Estilo da Logo Nova */
      .main-logo {
        height: 60px; /* Ajuste a altura conforme necessário */
        width: auto;
        object-fit: contain;
      }


      .search-bar {
        background: #f1f1f1;
        border-radius: 20px;
        padding: 5px 15px;
        display: flex;
        align-items: center;
        border: 1px solid #ddd;
      }
      .search-bar input {
        background: none;
        border: none;
        color: #333;
        outline: none;
        padding: 5px;
      }
      .search-bar input::placeholder {
        color: #888;
      }


      nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
        margin: 0;
      }
      nav a {
        color: var(--primary-green);
        text-decoration: none;
        font-weight: 600;
      }
      nav a:hover {
        text-decoration: underline;
      }


      /* --- FILTERS --- */
      .filters-bar {
        background-color: var(--primary-green);
        padding: 10px;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .filter-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        padding: 8px 20px;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.2s;
      }
      .filter-btn:hover {
        background: rgba(255, 255, 255, 0.4);
      }


      /* --- MAIN CONTENT --- */
      main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }


      /* Sidebar: Lista de Vagas */
      .sidebar {
        width: 40%;
        background-color: var(--sidebar-bg);
        overflow-y: auto;
        color: white;
      }
      .sidebar-header {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }


      .job-card {
        background: white;
        color: #333;
        margin: 1px 0;
        padding: 20px;
        display: flex;
        gap: 15px;
        cursor: pointer;
        transition: background 0.3s;
        border-left: 5px solid transparent;
      }
      .job-card:hover {
        background: #e8eaf6;
        border-left: 5px solid var(--primary-green);
      }
      .job-card.active {
        background: #e8eaf6;
        border-left: 5px solid var(--primary-green);
      }


      .job-card img {
        width: 60px;
        height: 60px;
        background: #006400;
        border-radius: 4px;
        object-fit: cover;
      }
      .job-card-info h4 {
        margin: 0 0 5px 0;
        color: #3f51b5;
        font-size: 1rem;
      }
      .job-card-info p {
        margin: 2px 0;
        font-size: 0.9em;
        color: #666;
      }


      /* Details Area */
      .details-view {
        width: 60%;
        background: white;
        padding: 40px;
        overflow-y: auto;
      }
      .job-detail-header {
        border-bottom: 1px solid #ddd;
        padding-bottom: 20px;
      }
      .tags {
        margin: 20px 0;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .tag {
        border: 1px solid #ccc;
        padding: 5px 15px;
        border-radius: 5px;
        font-size: 0.9em;
        background: #f9f9f9;
      }


      .btn-apply {
        background: #5c6bc0;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1em;
        transition: 0.3s;
      }
      .btn-apply:hover {
        background: #3f51b5;
      }
      .btn-apply:disabled {
        background: #ccc;
        cursor: not-allowed;
      }


      .btn-save {
        border: 1px solid #5c6bc0;
        color: #5c6bc0;
        background: none;
        padding: 12px 30px;
        border-radius: 5px;
        cursor: pointer;
        margin-left: 10px;
        transition: 0.3s;
      }
      .btn-save:hover {
        background: #f0f2f5;
      }
      .btn-save.saved {
        background-color: #ffebee;
        color: #e91e63;
        border-color: #e91e63;
      }


      .about-section {
        margin-top: 30px;
      }
      .info-block {
        margin-bottom: 20px;
      }
      .info-block h4 {
        color: #2d9669;
        margin-bottom: 10px;
      }
      .info-block ul {
        padding-left: 20px;
        color: #555;
      }
      .info-block li {
        margin-bottom: 5px;
      }


      /* --- MODAL (Formulário) --- */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        position: relative;
      }
      .close-btn {
        position: absolute;
        right: 20px;
        top: 15px;
        font-size: 24px;
        cursor: pointer;
        color: #aaa;
      }
      .close-btn:hover {
        color: #333;
      }


      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
      }
      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
      }


      .btn-submit {
        width: 100%;
        background: #2d9669;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.1em;
      }
      .btn-submit:hover {
        background: #237a55;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-area">
        <img
          src="logo_impulsiona.png"
          alt="Impulsiona Estágios IFPB"
          class="main-logo"
        />


        <div class="search-bar">
          <input type="text" placeholder="Pesquisar vagas..." id="mainSearch" />
        </div>
      </div>
      <nav>
        <ul>
          <li><a href="#">Vagas</a></li>
          <li><a href="#">Notificações</a></li>
          <li><a href="#">Perfil</a></li>
        </ul>
      </nav>
    </header>


    <div class="filters-bar">
      <button class="filter-btn">Todos</button>
      <button class="filter-btn">Eletrotécnica</button>
      <button class="filter-btn">Mecânica</button>
      <button class="filter-btn">Informática</button>
      <button class="filter-btn">Edificações</button>
    </div>


    <main>
      <section class="sidebar">
        <div class="sidebar-header">
          <div>
            <h3>Vagas Recentes</h3>
            <small id="count-label">Carregando...</small>
          </div>
        </div>
        <div id="job-list"></div>
      </section>


      <section class="details-view" id="job-details">
        <p style="text-align: center; color: #777; margin-top: 50px">
          Selecione uma vaga para ver os detalhes completos.
        </p>
      </section>
    </main>


    <div id="applyModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 style="color: var(--primary-green); margin-top: 0">
          Candidatar-se à Vaga
        </h2>
        <p
          id="modalJobTitle"
          style="color: #666; font-size: 0.9em; margin-bottom: 20px"
        ></p>


        <form id="applyForm">
          <input type="hidden" id="jobIdHidden" />
          <div class="form-group">
            <label for="name">Nome Completo</label>
            <input
              type="text"
              id="name"
              required
              placeholder="Ex: Maria Silva"
            />
          </div>
          <div class="form-group">
            <label for="matricula">Matrícula</label>
            <input
              type="text"
              id="matricula"
              required
              placeholder="Ex: 2023100500"
            />
          </div>
          <div class="form-group">
            <label for="email">E-mail Institucional</label>
            <input
              type="email"
              id="email"
              required
              placeholder="nome@academico.ifpb.edu.br"
            />
          </div>


          <button type="submit" class="btn-submit">
            Confirmar Candidatura
          </button>
        </form>
      </div>
    </div>


    <script>
      // --- DADOS ---
      const jobs = [
        {
          id: 1,
          title: "Estágio em Eletrônica e Eletrotécnica",
          company: "AEC / IFPB Parceiros",
          location: "João Pessoa - PB (Híbrido)",
          time: "Há 5 horas",
          type: "Estágio",
          shift: "13:30 às 19:00",
          salary: "R$ 800,00 + VT",
          target: "Eletrotécnica / Eletrônica",
          desc: "Oportunidade para atuar no setor de manutenção e testes de componentes eletrônicos. O estagiário terá supervisão direta de engenheiros da área.",
          requirements: [
            "Noções de Eletricidade Básica (EB)",
            "Conhecimento em diodos e transistores",
            "Matrícula ativa no IFPB",
          ],
          benefits: [
            "Bolsa Auxílio",
            "Vale Transporte",
            "Seguro de Vida",
            "Possibilidade de Efetivação",
          ],
        },
        {
          id: 2,
          title: "Suporte Técnico em Mecânica Industrial",
          company: "Indústria MetalPB",
          location: "Cabedelo - PB (Presencial)",
          time: "Há 2 dias",
          type: "Estágio",
          shift: "08:00 às 12:00",
          salary: "R$ 950,00",
          target: "Mecânica",
          desc: "Vaga para suporte em oficina mecânica, auxílio na manutenção preventiva de tornos CNC e organização do setor de usinagem.",
          requirements: [
            "Leitura de desenho técnico",
            "Disponibilidade matinal",
            "Proatividade",
          ],
          benefits: [
            "Bolsa Auxílio",
            "Refeitório no local",
            "Transporte Fretado",
          ],
        },
        {
          id: 3,
          title: "Desenhista Cadista (Projetos)",
          company: "Construtora Horizonte",
          location: "Campina Grande - PB (Remoto)",
          time: "Há 1 semana",
          type: "Remoto",
          shift: "Flexível (20h semanais)",
          salary: "R$ 1.100,00",
          target: "Edificações / Mecânica",
          desc: "Atividades de desenho técnico assistido por computador (AutoCAD/Revit). Apoio na elaboração de plantas baixas e cortes.",
          requirements: [
            "Domínio de AutoCAD",
            "Noções de Revit é um diferencial",
            "Computador próprio para trabalho remoto",
          ],
          benefits: [
            "Bolsa Auxílio",
            "Ajuda de Custo Internet",
            "Mentoria de Carreira",
          ],
        },
        {
          id: 4,
          title: "Desenvolvimento Web (Front-end)",
          company: "Startup Inova",
          location: "João Pessoa - PB (Remoto)",
          time: "Há 3 horas",
          type: "Estágio",
          shift: "Manhã ou Tarde",
          salary: "R$ 1.200,00",
          target: "Informática / ADS",
          desc: "Desenvolvimento de interfaces web utilizando HTML, CSS e JavaScript. Auxílio na manutenção do portal da empresa.",
          requirements: [
            "Lógica de Programação",
            "HTML/CSS Intermediário",
            "Vontade de aprender React",
          ],
          benefits: [
            "Horário Flexível",
            "Day-off no aniversário",
            "Cursos Alura",
          ],
        },
      ];


      // --- ESTADO DO SISTEMA ---
      let myApplications =
        JSON.parse(localStorage.getItem("ifpb_applications")) || [];
      let savedJobs = JSON.parse(localStorage.getItem("ifpb_saved")) || [];


      const jobListContainer = document.getElementById("job-list");
      const jobDetailsContainer = document.getElementById("job-details");
      const searchInput = document.getElementById("mainSearch");
      const modal = document.getElementById("applyModal");
      const form = document.getElementById("applyForm");


      // --- FUNÇÕES ---


      function renderJobs(filterText = "") {
        jobListContainer.innerHTML = "";


        const filteredJobs = jobs.filter(
          (job) =>
            job.title.toLowerCase().includes(filterText.toLowerCase()) ||
            job.target.toLowerCase().includes(filterText.toLowerCase())
        );


        filteredJobs.forEach((job) => {
          const isSaved = savedJobs.includes(job.id);
          const card = document.createElement("div");
          card.className = "job-card";
          card.id = `card-${job.id}`;
          card.innerHTML = `
                    <img src="https://ui-avatars.com/api/?name=${
                      job.company
                    }&background=2d9669&color=fff" alt="Logo">
                    <div class="job-card-info">
                        <div style="display:flex; justify-content:space-between">
                            <h4>${job.title}</h4>
                            ${
                              isSaved
                                ? '<span style="color:#e91e63">♥</span>'
                                : ""
                            }
                        </div>
                        <p><strong>${job.company}</strong></p>
                        <p>${job.location}</p>
                        <small style="color: ${
                          job.time.includes("horas") ? "green" : "gray"
                        }">${job.time}</small>
                        ${
                          myApplications.includes(job.id)
                            ? '<br><small style="color: var(--sidebar-bg); font-weight:bold">✓ Candidatura Enviada</small>'
                            : ""
                        }
                    </div>
                `;
          card.onclick = () => {
            document
              .querySelectorAll(".job-card")
              .forEach((c) => c.classList.remove("active"));
            card.classList.add("active");
            showDetails(job);
          };
          jobListContainer.appendChild(card);
        });


        document.getElementById(
          "count-label"
        ).innerText = `${filteredJobs.length} vagas encontradas`;
      }


      function showDetails(job) {
        const hasApplied = myApplications.includes(job.id);
        const isSaved = savedJobs.includes(job.id);


        const reqList = job.requirements
          .map((req) => `<li>${req}</li>`)
          .join("");
        const benList = job.benefits.map((ben) => `<li>${ben}</li>`).join("");


        const applyBtnHtml = hasApplied
          ? `<button class="btn-apply" disabled>✓ Candidatura Enviada</button>`
          : `<button class="btn-apply" onclick="openModal(${job.id}, '${job.title}')">Candidatar-se agora</button>`;


        // Lógica do botão salvar
        const saveBtnHtml = isSaved
          ? `<button class="btn-save saved" onclick="toggleSave(${job.id})">♥ Salvo</button>`
          : `<button class="btn-save" onclick="toggleSave(${job.id})">♡ Salvar</button>`;


        jobDetailsContainer.innerHTML = `
                <div class="job-detail-header">
                    <h2 style="color: #333; margin-bottom: 5px;">${job.title}</h2>
                    <h4 style="color: #666; font-weight: normal; margin: 0;">${job.company}</h4>
                    <p style="margin-top: 10px; font-size: 0.9em;">
                         ${job.location} &nbsp; | &nbsp;  ${job.salary}
                    </p>
                </div>
               
                <div class="tags">
                    <span class="tag"> ${job.target}</span>
                    <span class="tag"> ${job.shift}</span>
                    <span class="tag"> ${job.type}</span>
                </div>


                <div style="margin-bottom: 30px;">
                    ${applyBtnHtml}
                    ${saveBtnHtml}
                </div>


                <div class="about-section">
                    <div class="info-block">
                        <h4>Sobre a Vaga</h4>
                        <p style="line-height: 1.6; color: #555;">${job.desc}</p>
                    </div>


                    <div class="info-block">
                        <h4>Requisitos Obrigatórios</h4>
                        <ul>${reqList}</ul>
                    </div>


                    <div class="info-block">
                        <h4>Benefícios</h4>
                        <ul>${benList}</ul>
                    </div>
                </div>
            `;
      }


      // --- FUNÇÃO SALVAR/FAVORITAR ---
      function toggleSave(jobId) {
        if (savedJobs.includes(jobId)) {
          // Remove dos salvos
          savedJobs = savedJobs.filter((id) => id !== jobId);
        } else {
          // Adiciona aos salvos
          savedJobs.push(jobId);
        }
        // Persiste no LocalStorage
        localStorage.setItem("ifpb_saved", JSON.stringify(savedJobs));


        // Atualiza a tela (Detalhes e Lista lateral para mostrar o ícone)
        const currentJob = jobs.find((j) => j.id === jobId);
        showDetails(currentJob);
        renderJobs(searchInput.value); // Atualiza lateral para aparecer o coraçãozinho


        // Re-seleciona visualmente o card lateral
        setTimeout(() => {
          const card = document.getElementById(`card-${jobId}`);
          if (card) card.classList.add("active");
        }, 50);
      }


      // --- LÓGICA DO MODAL ---
      function openModal(jobId, jobTitle) {
        document.getElementById("jobIdHidden").value = jobId;
        document.getElementById(
          "modalJobTitle"
        ).innerText = `Vaga: ${jobTitle}`;
        modal.style.display = "flex";
      }


      function closeModal() {
        modal.style.display = "none";
        form.reset();
      }


      window.onclick = function (event) {
        if (event.target == modal) closeModal();
      };


      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const jobId = parseInt(document.getElementById("jobIdHidden").value);
        const name = document.getElementById("name").value;


        alert(`Sucesso, ${name}! Sua candidatura foi enviada.`);


        myApplications.push(jobId);
        localStorage.setItem(
          "ifpb_applications",
          JSON.stringify(myApplications)
        );


        closeModal();
        renderJobs(searchInput.value);


        const currentJob = jobs.find((j) => j.id === jobId);
        showDetails(currentJob);
      });


      // Eventos de Busca e Filtro
      searchInput.addEventListener("input", (e) => renderJobs(e.target.value));


      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          const filter =
            e.target.innerText === "Todos" ? "" : e.target.innerText;
          searchInput.value = filter;
          renderJobs(filter);
        });
      });


      // Inicialização
      renderJobs();
    </script>
  </body>
</html>
