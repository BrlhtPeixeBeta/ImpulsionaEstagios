<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impulsiona Estágios - IFPB</title>
  <style>
    :root {
      --primary-green: #2d9669;
      --dark-green: #22543d;
      --sidebar-bg: #5c6bc0;
      --light-bg: #f4f7f6;
      --text-dark: #333;
      --card-border: #e2e8f0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: var(--light-bg);
    }

    /* --- HEADER --- */
    header {
      background-color: white;
      border-bottom: 3px solid var(--primary-green);
      color: var(--text-dark);
      padding: 10px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 30px;
      /* Espaço entre logo, busca e nav */
      flex: 1;
    }

    .main-logo {
      height: 50px;
      width: auto;
    }

    /* Estilização da busca no Header */
    .header-search {
      flex: 1;
      max-width: 250px;
      position: relative;
      padding-top: 5px;
      padding-right: 35px;
      padding-bottom: 10px;
      padding-left: 15px;

    }

    .header-search input {
      width: 100%;
      padding: 10px 15px;
      border-radius: 25px;
      border: 1px solid #e2e8f0;
      background-color: #f8fafc;
      outline: none;
      font-size: 0.95rem;
      transition: 0.3s;
    }

    .header-search input:focus {
      border-color: var(--primary-green);
      background-color: white;
      box-shadow: 0 0 0 3px rgba(45, 150, 105, 0.1);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #555;
      text-decoration: none;
      font-weight: 600;
      padding-bottom: 5px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }

    nav a:hover,
    nav a.active {
      color: var(--primary-green);
      border-bottom: 2px solid var(--primary-green);
    }

    /* --- LAYOUT CONTROL --- */
    main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .view-section {
      display: none;
      height: 100%;
      width: 100%;
    }

    .view-section.active-view {
      display: flex;
    }

    /* --- VIEW 1: VAGAS --- */
    #view-jobs-container {
      flex-direction: column;
    }

    .content-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .filters-bar {
      background-color: var(--primary-green);
      padding: 15px 40px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      /* Botões agora ficam à direita */
      gap: 20px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      gap: 10px;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }

    .filter-btn:hover,
    .filter-btn.active-filter {
      background: rgba(255, 255, 255, 0.4);
    }

    .sidebar-list {
      width: 40%;
      background-color: var(--sidebar-bg);
      overflow-y: auto;
      color: white;
    }

    .sidebar-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .job-card {
      background: white;
      color: #333;
      margin: 1px 0;
      padding: 20px;
      display: flex;
      gap: 15px;
      cursor: pointer;
      transition: background 0.3s;
      border-left: 5px solid transparent;
    }

    .job-card:hover,
    .job-card.active {
      background: #e8eaf6;
      border-left: 5px solid var(--primary-green);
    }

    .job-card img {
      width: 60px;
      height: 60px;
      border-radius: 4px;
      object-fit: cover;
    }

    .job-card-info h4 {
      margin: 0 0 5px 0;
      color: #3f51b5;
      font-size: 1rem;
    }

    .job-card-info p {
      margin: 2px 0;
      font-size: 0.9em;
      color: #666;
    }

    .details-view {
      width: 60%;
      background: white;
      padding: 40px;
      overflow-y: auto;
    }

    /* --- VIEW 2: CADASTRO --- */
    #view-register-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      gap: 30px;
      overflow-y: auto;
      box-sizing: border-box;
      align-items: flex-start;
    }

    .profile-sidebar {
      width: 300px;
      flex-shrink: 0;
    }

    .profile-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      text-align: center;
      margin-bottom: 20px;
    }

    .card-header-green {
      background-color: #aed581;
      height: 100px;
      position: relative;
    }

    .avatar-circle {
      width: 90px;
      height: 90px;
      background-color: #206a5d;
      color: white;
      font-size: 40px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 4px solid white;
      position: absolute;
      bottom: -45px;
      left: 50%;
      transform: translateX(-50%);
    }

    .card-body {
      padding: 55px 20px 30px 20px;
    }

    .form-area {
      flex: 1;
      width: 100%;
    }

    .page-title {
      color: #206a5d;
      font-size: 2rem;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .section-label {
      color: #2f855a;
      font-weight: 700;
      margin-bottom: 15px;
      margin-top: 25px;
      display: block;
    }

    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    .col-half {
      flex: 1;
    }

    .form-box input,
    .form-box select,
    .form-box textarea {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.95rem;
      box-sizing: border-box;
    }

    .btn-register {
      background-color: #38a169;
      color: white;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    /* Utilities */
    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .tag {
      border: 1px solid #ccc;
      padding: 5px 15px;
      border-radius: 5px;
      font-size: 0.9em;
      background: #f9f9f9;
    }

    .btn-save {
      border: 1px solid #5c6bc0;
      color: #5c6bc0;
      background: none;
      padding: 12px 30px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-save.saved {
      background-color: #ffebee;
      color: #e91e63;
      border-color: #e91e63;
    }

    .info-block h4 {
      color: #2d9669;
      margin-bottom: 10px;
    }

    .info-block ul {
      padding-left: 20px;
      color: #555;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo-area">
      <img src="logo_impulsiona.png" alt="Impulsiona Estágios IFPB" class="main-logo" />

      <div class="header-search">
        <input type="text" id="jobSearch" placeholder="Pesquisar vagas" onkeyup="handleSearch()">
      </div>

      <nav>
        <ul>
          <li><a onclick="switchView('jobs')" id="nav-vagas" class="active">Vagas de Estágio</a></li>
          <li><a onclick="switchView('register')" id="nav-cadastro">Cadastro de Vagas</a></li>
          <li><a href="#">Notificações</a></li>
          <li><a href="#">Meu Perfil</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div id="view-jobs-container" class="view-section active-view">
      <div class="filters-bar">
        <div class="filter-group">
          <button class="filter-btn active-filter" onclick="filterBy('Todos', this)">Todos</button>
          <button class="filter-btn" onclick="filterBy('Eletrotécnica', this)">Eletrotécnica</button>
          <button class="filter-btn" onclick="filterBy('Mecânica', this)">Mecânica</button>
          <button class="filter-btn" onclick="filterBy('Informática', this)">Informática</button>
        </div>
      </div>

      <div class="content-wrapper">
        <section class="sidebar-list">
          <div class="sidebar-header">
            <div>
              <h3>Vagas Disponíveis</h3>
              <small id="count-label">Carregando...</small>
            </div>
          </div>
          <div id="job-list"></div>
        </section>

        <section class="details-view" id="job-details">
          <p style="text-align: center; color: #777; margin-top: 50px">
            Selecione uma vaga para ver os detalhes completos.
          </p>
        </section>
      </div>
    </div>

    <div id="view-register-container" class="view-section">
      <aside class="profile-sidebar">
        <div class="profile-card">
          <div class="card-header-green">
            <div class="avatar-circle">E</div>
          </div>
          <div class="card-body">
            <h3>Empresa X</h3>
            <p>João Pessoa, Paraíba, Brasil.</p>
          </div>
        </div>
      </aside>

      <section class="form-area">
        <h2 class="page-title">Cadastro de Vagas de Estágio</h2>
        <div class="form-box">
          <form id="createJobForm">
            <span class="section-label">Dados da Empresa</span>
            <div class="form-row">
              <div class="col-half">
                <label>Nome da Empresa</label>
                <input type="text" id="regCompany" placeholder="Ex: Tech Solutions LTDA" required>
              </div>
              <div class="col-half">
                <label>E-mail de Contato</label>
                <input type="email" id="regEmail" placeholder="empresa@email.com" required>
              </div>
            </div>

            <span class="section-label">Dados da Vaga</span>
            <div class="form-row">
              <div class="col-half">
                <label>Título da Vaga</label>
                <input type="text" id="regTitle" placeholder="Ex: Estágio em TI" required>
              </div>
              <div class="col-half">
                <label>Área de Atuação</label>
                <select id="regTarget">
                  <option value="Informática">Informática</option>
                  <option value="Mecânica">Mecânica</option>
                  <option value="Eletrotécnica">Eletrotécnica</option>
                  <option value="Edificações">Edificações</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="col-half">
                <label>Cidade</label>
                <input type="text" id="regCity" placeholder="João Pessoa - PB" required>
              </div>
              <div class="col-half">
                <label>Bolsa (R$)</label>
                <input type="text" id="regSalary" placeholder="Ex: 800" required>
              </div>
            </div>

            <div class="form-row">
              <div class="col-half">
                <label>Descrição da Vaga</label>
                <textarea id="regDesc" placeholder="Descreva as atividades"></textarea>
              </div>
              <div class="col-half">
                <label>Requisitos</label>
                <textarea id="regReq" placeholder="Ex: Conhecimentos básicos"></textarea>
              </div>
            </div>

            <button type="submit" class="btn-register">Publicar Vaga</button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script>
    const initialJobs = [
      {
        id: 1,
        title: "Estágio em Eletrônica",
        company: "AEC / IFPB Parceiros",
        location: "João Pessoa - PB",
        time: "Há 5 horas",
        type: "Estágio",
        salary: "R$ 800,00",
        target: "Eletrotécnica",
        desc: "Manutenção e testes de componentes eletrônicos.",
        requirements: ["Eletricidade Básica", "Matrícula ativa"],
        benefits: ["Bolsa Auxílio", "VT"]
      },
      {
        id: 2,
        title: "Suporte em Mecânica",
        company: "Indústria MetalPB",
        location: "Cabedelo - PB",
        time: "Há 2 dias",
        type: "Estágio",
        salary: "R$ 950,00",
        target: "Mecânica",
        desc: "Auxílio na manutenção preventiva de tornos CNC.",
        requirements: ["Desenho técnico", "Proatividade"],
        benefits: ["Refeitório", "Transporte"]
      }
    ];

    let jobs = JSON.parse(localStorage.getItem("ifpb_jobs")) || initialJobs;
    let savedJobs = JSON.parse(localStorage.getItem("ifpb_saved")) || [];
    let currentFilter = "Todos";

    function switchView(viewName) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
      document.querySelectorAll('nav a').forEach(el => el.classList.remove('active'));

      if (viewName === 'jobs') {
        document.getElementById('view-jobs-container').classList.add('active-view');
        document.getElementById('nav-vagas').classList.add('active');
        renderJobs();
      } else {
        document.getElementById('view-register-container').classList.add('active-view');
        document.getElementById('nav-cadastro').classList.add('active');
      }
    }

    function handleSearch() {
      renderJobs();
    }

    function filterBy(criteria, btn) {
      currentFilter = criteria;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
      btn.classList.add('active-filter');
      renderJobs();
    }

    function renderJobs() {
      const listContainer = document.getElementById("job-list");
      const searchText = document.getElementById("jobSearch").value.toLowerCase();
      listContainer.innerHTML = "";

      const filtered = jobs.filter(job => {
        const matchesFilter = currentFilter === "Todos" || job.target === currentFilter;
        const matchesSearch = job.title.toLowerCase().includes(searchText) ||
          job.company.toLowerCase().includes(searchText);
        return matchesFilter && matchesSearch;
      });

      filtered.forEach(job => {
        const isSaved = savedJobs.includes(job.id);
        const card = document.createElement("div");
        card.className = "job-card";
        card.id = `card-${job.id}`;

        const avatarUrl = `https://ui-avatars.com/api/?name=${job.company}&background=2d9669&color=fff`;

        card.innerHTML = `
            <img src="${avatarUrl}" alt="Logo">
            <div class="job-card-info" style="flex:1">
              <div style="display:flex; justify-content:space-between">
                  <h4>${job.title}</h4>
                  ${isSaved ? '<span style="color:#e91e63">♥</span>' : ''}
              </div>
              <p><strong>${job.company}</strong></p>
              <p>${job.location}</p>
              <small style="color: green">${job.time}</small>
            </div>
          `;

        card.onclick = () => {
          document.querySelectorAll(".job-card").forEach(c => c.classList.remove("active"));
          card.classList.add("active");
          showDetails(job);
        };
        listContainer.appendChild(card);
      });

      document.getElementById("count-label").innerText = `${filtered.length} vagas encontradas`;
    }

    function showDetails(job) {
      const isSaved = savedJobs.includes(job.id);
      const reqList = Array.isArray(job.requirements) ? job.requirements.map(r => `<li>${r}</li>`).join("") : `<li>${job.requirements}</li>`;

      document.getElementById("job-details").innerHTML = `
            <div style="border-bottom:1px solid #eee; padding-bottom:20px;">
              <h2 style="margin:0; color:#333">${job.title}</h2>
              <h4 style="margin:5px 0; color:#666">${job.company}</h4>
              <p>${job.location} | <strong>${job.salary}</strong></p>
              <div class="tags">
                 <span class="tag">${job.target}</span>
                 <span class="tag">${job.type}</span>
              </div>
              <button class="btn-save ${isSaved ? 'saved' : ''}" onclick="toggleSave(${job.id})">
                ${isSaved ? '♥ Salvo' : '♡ Salvar Vaga'}
              </button>
            </div>
            <div style="margin-top:20px">
              <div class="info-block">
                 <h4>Sobre a Vaga</h4>
                 <p style="color:#555; line-height:1.6">${job.desc}</p>
              </div>
              <div class="info-block">
                 <h4>Requisitos</h4>
                 <ul>${reqList}</ul>
              </div>
            </div>
        `;
    }

    function toggleSave(jobId) {
      if (savedJobs.includes(jobId)) {
        savedJobs = savedJobs.filter(id => id !== jobId);
      } else {
        savedJobs.push(jobId);
      }
      localStorage.setItem("ifpb_saved", JSON.stringify(savedJobs));
      renderJobs();
      showDetails(jobs.find(j => j.id === jobId));
    }

    document.getElementById('createJobForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const newJob = {
        id: Date.now(),
        company: document.getElementById('regCompany').value,
        title: document.getElementById('regTitle').value,
        target: document.getElementById('regTarget').value,
        location: document.getElementById('regCity').value,
        salary: "R$ " + document.getElementById('regSalary').value,
        desc: document.getElementById('regDesc').value,
        requirements: document.getElementById('regReq').value.split('\n'),
        time: "Nova",
        type: "Estágio"
      };
      jobs.unshift(newJob);
      localStorage.setItem("ifpb_jobs", JSON.stringify(jobs));
      alert("Vaga cadastrada com sucesso!");
      this.reset();
      switchView('jobs');
    });

    renderJobs();
  </script>
</body>

</html>
